<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登入 AI 投資分析師</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 520px; margin: 60px auto; padding: 0 16px; line-height: 1.6; }
      .card { border: 1px solid #ddd; border-radius: 12px; padding: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
      input, button { font-size: 16px; width: 100%; box-sizing: border-box; }
      input { padding: 12px; margin: 12px 0; }
      button { padding: 12px 16px; }
      .muted { color: #666; font-size: 14px; }
      .error { color: #b42318; margin-bottom: 12px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>登入 AI 投資分析師</h1>
      <p class="muted">請先輸入網站密碼，才能查看股票分析報告。</p>
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
      <form method="post" action="/login">
        <input type="password" name="password" placeholder="請輸入網站密碼" required />
        <button type="submit">登入</button>
      </form>
    </div>
  </body>
</html>
