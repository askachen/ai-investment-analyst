<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 投資分析師</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --card: #ffffff;
        --text: #162033;
        --muted: #667085;
        --border: #dbe2ea;
        --accent: #4f46e5;
        --accent-soft: #eef2ff;
        --success: #047857;
        --warning: #b45309;
      }
      body { font-family: Arial, sans-serif; max-width: 1040px; margin: 32px auto; padding: 0 16px 40px; line-height: 1.6; background: var(--bg); color: var(--text); }
      input, button, textarea { font-size: 16px; }
      input { padding: 12px 14px; width: 240px; border-radius: 10px; border: 1px solid var(--border); }
      button { padding: 12px 16px; border: 0; border-radius: 10px; background: var(--accent); color: white; font-weight: 600; cursor: pointer; }
      .hero, .panel, .report-shell { background: var(--card); border: 1px solid var(--border); border-radius: 18px; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06); }
      .hero { padding: 28px; margin-bottom: 20px; }
      .panel { padding: 20px 24px; margin-bottom: 20px; }
      .report-shell { padding: 24px; }
      .muted { color: var(--muted); font-size: 14px; }
      .form-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
      .report-card { display: grid; gap: 20px; }
      .report-header h1 { margin: 0 0 8px; font-size: 32px; }
      .report-badges { display: flex; gap: 10px; flex-wrap: wrap; }
      .badge { display: inline-flex; align-items: center; border-radius: 999px; padding: 6px 12px; font-size: 14px; font-weight: 700; }
      .badge-rating { background: var(--accent-soft); color: var(--accent); }
      .badge-confidence { background: #ecfdf3; color: var(--success); }
      .report-section { border-top: 1px solid var(--border); padding-top: 18px; }
      .report-section h2 { margin: 0 0 10px; font-size: 20px; }
      .report-section p { margin: 0 0 10px; }
      .report-section ul { margin: 0; padding-left: 20px; }
      .report-section li { margin-bottom: 8px; }
      .placeholder { color: var(--muted); background: #f8fafc; border: 1px dashed var(--border); border-radius: 14px; padding: 18px; }
      @media (max-width: 640px) {
        .hero, .panel, .report-shell { padding: 18px; }
        .report-header h1 { font-size: 26px; }
        input, button { width: 100%; }
      }
    </style>
  </head>
  <body>
    <section class="hero">
      <h1>AI 投資分析師</h1>
      <p>輸入股票代號，例如 2330、TSM、AAPL，快速取得較接近台灣分析師口吻的個股分析。</p>
    </section>
    <section class="panel">
      <form id="report-form">
        <div class="form-row">
          <input type="text" name="ticker" id="ticker" placeholder="請輸入股票代號" value="{{ ticker }}" />
          <button type="submit">開始分析</button>
        </div>
      </form>
      <p class="muted">本內容僅供參考，不構成投資建議。</p>
    </section>
    <section class="report-shell">
      <div id="result-html" class="placeholder">{% if result %}{{ result }}{% else %}尚未產生報告{% endif %}</div>
    </section>
    <script>
      const form = document.getElementById('report-form');
      const result = document.getElementById('result-html');
      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const ticker = document.getElementById('ticker').value;
        result.innerHTML = '<div class="placeholder">分析中，請稍候...</div>';
        const response = await fetch('/api/report', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ticker})
        });
        const payload = await response.json();
        if (!response.ok) {
          result.innerHTML = `<div class="placeholder">${payload.detail || '產生報告時發生錯誤'}</div>`;
          return;
        }
        result.innerHTML = payload.report_html;
      });
    </script>
  </body>
</html>
